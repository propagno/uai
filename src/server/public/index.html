<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UAI — Unidade de Análise Inteligente</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────── */
    #sidebar {
      width: 300px;
      min-width: 300px;
      background: #1a1d27;
      border-right: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #2d3148;
      background: #13162a;
    }

    #sidebar-header h1 {
      font-size: 18px;
      font-weight: 700;
      color: #7c83ff;
      letter-spacing: 0.5px;
    }

    #sidebar-header p {
      font-size: 11px;
      color: #64748b;
      margin-top: 2px;
    }

    #filters {
      padding: 12px 16px;
      border-bottom: 1px solid #2d3148;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #filters label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

    input[type=text], input[type=range], select {
      width: 100%;
      background: #0f1117;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-radius: 4px;
      padding: 6px 8px;
      font-size: 13px;
      outline: none;
    }

    input[type=text]:focus, select:focus { border-color: #7c83ff; }

    #filters .row { display: flex; gap: 8px; align-items: center; }
    #filters .row input[type=range] { flex: 1; padding: 0; }
    #filters .row span { font-size: 12px; color: #94a3b8; width: 32px; text-align: right; }

    button {
      background: #7c83ff;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 7px 12px;
      cursor: pointer;
      font-size: 13px;
      width: 100%;
      font-weight: 600;
    }
    button:hover { background: #6169f0; }
    button.secondary { background: #2d3148; color: #94a3b8; }
    button.secondary:hover { background: #363b5a; }

    #stats {
      padding: 8px 16px;
      border-bottom: 1px solid #2d3148;
      font-size: 11px;
      color: #64748b;
      display: flex;
      gap: 12px;
    }

    #stats b { color: #94a3b8; }

    /* ── Detail panel ────────────────────────────────────── */
    #detail {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
    }

    #detail h2 { font-size: 14px; color: #7c83ff; margin-bottom: 6px; }
    #detail h3 { font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.4px; margin: 10px 0 4px; }
    #detail p  { font-size: 12px; color: #cbd5e1; line-height: 1.5; }

    .badge {
      display: inline-block;
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 999px;
      font-weight: 600;
      margin-left: 4px;
    }

    .rel-list { list-style: none; }
    .rel-list li {
      font-size: 11px;
      padding: 3px 0;
      border-bottom: 1px solid #1e2235;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
    }
    .rel-list li span.name {
      color: #7c83ff;
      cursor: pointer;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .rel-list li span.name:hover { text-decoration: underline; }
    .rel-list li span.rel-type { color: #475569; font-size: 10px; flex-shrink: 0; }

    #source-preview {
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 4px;
      padding: 8px;
      font-family: 'Courier New', monospace;
      font-size: 10px;
      color: #94a3b8;
      max-height: 200px;
      overflow-y: auto;
      white-space: pre;
      margin-top: 4px;
    }

    /* ── Graph area ──────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #toolbar {
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      padding: 8px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #toolbar button { width: auto; padding: 5px 10px; font-size: 12px; }

    #search-bar {
      flex: 1;
      position: relative;
    }

    #search-bar input {
      width: 100%;
      padding: 5px 8px;
      font-size: 12px;
    }

    #search-results {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 4px;
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
      display: none;
    }

    #search-results.visible { display: block; }

    .search-item {
      padding: 6px 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }
    .search-item:hover { background: #2d3148; }
    .search-item .si-name { color: #e2e8f0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-item .si-type { color: #475569; font-size: 10px; flex-shrink: 0; }

    #cy {
      flex: 1;
      background: #0f1117;
    }

    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1117;
      z-index: 10;
      font-size: 14px;
      color: #64748b;
      flex-direction: column;
      gap: 8px;
    }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #2d3148;
      border-top-color: #7c83ff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Entity type colors ───────────────────────────── */
    :root {
      --c-program:   #7c83ff;
      --c-copybook:  #34d399;
      --c-job:       #f59e0b;
      --c-table:     #f87171;
      --c-screen:    #a78bfa;
      --c-procedure: #38bdf8;
      --c-unknown:   #64748b;
    }

    .type-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="sidebar-header">
    <h1>UAI</h1>
    <p>Unidade de Análise Inteligente</p>
  </div>

  <div id="filters">
    <label>Tipos de entidade</label>
    <select id="filter-type" multiple style="height:90px">
      <option value="program"   selected>Programas</option>
      <option value="copybook"  selected>Copybooks</option>
      <option value="job"       selected>Jobs</option>
      <option value="table"     selected>Tabelas</option>
      <option value="screen"    selected>Telas</option>
      <option value="procedure" selected>Procedures</option>
    </select>

    <label>Tipos de relação</label>
    <select id="filter-rel" multiple style="height:70px">
      <option value="CALLS"    selected>CALLS</option>
      <option value="INCLUDES" selected>INCLUDES</option>
      <option value="EXECUTES" selected>EXECUTES</option>
      <option value="READS"    selected>READS</option>
      <option value="WRITES"   selected>WRITES</option>
      <option value="UPDATES"  selected>UPDATES</option>
    </select>

    <label>Confiança mínima</label>
    <div class="row">
      <input type="range" id="filter-conf" min="0" max="1" step="0.05" value="0">
      <span id="conf-label">0.0</span>
    </div>

    <button id="btn-load">Carregar grafo</button>
    <button class="secondary" id="btn-reset-layout">Reorganizar layout</button>
  </div>

  <div id="stats">
    <span><b id="stat-nodes">0</b> nós</span>
    <span><b id="stat-edges">0</b> arestas</span>
  </div>

  <div id="detail">
    <p style="color:#475569; font-size:12px">Clique em um nó para ver os detalhes.</p>
  </div>
</div>

<!-- Main graph area -->
<div id="main" style="position:relative">
  <div id="toolbar">
    <div id="search-bar">
      <input type="text" id="search-input" placeholder="Buscar entidade... (Enter)">
      <div id="search-results"></div>
    </div>
    <button id="btn-fit">Ajustar</button>
    <button id="btn-export-svg" class="secondary">Exportar SVG</button>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <span>Carregando modelo...</span>
  </div>

  <div id="cy"></div>
</div>

<script>
/* ── Config ──────────────────────────────────────────────────────── */
const BASE = '';  // same origin

const TYPE_COLORS = {
  program:   '#7c83ff',
  copybook:  '#34d399',
  job:       '#f59e0b',
  table:     '#f87171',
  screen:    '#a78bfa',
  procedure: '#38bdf8',
};

const REL_COLORS = {
  CALLS:    '#7c83ff',
  INCLUDES: '#34d399',
  EXECUTES: '#f59e0b',
  READS:    '#38bdf8',
  WRITES:   '#f87171',
  UPDATES:  '#fb923c',
};

/* ── Cytoscape instance ──────────────────────────────────────────── */
let cy = null;

function initCy(elements) {
  if (cy) cy.destroy();

  cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: [
      {
        selector: 'node',
        style: {
          'background-color': ele => TYPE_COLORS[ele.data('type')] || '#64748b',
          'label':            'data(label)',
          'color':            '#e2e8f0',
          'font-size':        10,
          'text-valign':      'bottom',
          'text-margin-y':    4,
          'width':            24,
          'height':           24,
          'border-width':     ele => ele.data('inferred') ? 2 : 0,
          'border-color':     '#475569',
          'border-style':     'dashed',
        },
      },
      {
        selector: 'node:selected',
        style: {
          'border-width': 3,
          'border-color': '#fff',
          'border-style': 'solid',
        },
      },
      {
        selector: 'edge',
        style: {
          'line-color':         ele => REL_COLORS[ele.data('rel')] || '#2d3148',
          'target-arrow-color': ele => REL_COLORS[ele.data('rel')] || '#2d3148',
          'target-arrow-shape': 'triangle',
          'curve-style':        'bezier',
          'width':              1.5,
          'opacity':            0.6,
          'font-size':          9,
          'color':              '#94a3b8',
        },
      },
      {
        selector: 'edge:selected',
        style: { 'opacity': 1, 'width': 3 },
      },
    ],
    layout: { name: 'cose', animate: false, randomize: true, nodeRepulsion: 8000, padding: 30 },
  });

  cy.on('tap', 'node', evt => showDetail(evt.target.data()));
  cy.on('tap', evt => { if (evt.target === cy) clearDetail(); });
}

/* ── Load graph ──────────────────────────────────────────────────── */
async function loadGraph() {
  showLoading(true);

  const types   = [...document.getElementById('filter-type').selectedOptions].map(o => o.value);
  const rels    = [...document.getElementById('filter-rel').selectedOptions].map(o => o.value);
  const minConf = document.getElementById('filter-conf').value;

  const params = new URLSearchParams({
    type:    types.join(','),
    rel:     rels.join(','),
    minConf,
  });

  try {
    const data = await fetch(`${BASE}/api/graph?${params}`).then(r => r.json());

    const elements = [
      ...data.nodes.map(n => ({
        data: { id: n.id, label: n.label, type: n.type, file: n.file, confidence: n.confidence, inferred: n.inferred },
      })),
      ...data.edges.map(e => ({
        data: { source: e.source, target: e.target, rel: e.rel, confidence: e.confidence },
      })),
    ];

    initCy(elements);
    document.getElementById('stat-nodes').textContent = data.stats.nodes;
    document.getElementById('stat-edges').textContent = data.stats.edges;
  } catch (err) {
    alert('Erro ao carregar grafo: ' + err.message);
  }

  showLoading(false);
}

/* ── Detail panel ─────────────────────────────────────────────────── */
async function showDetail(data) {
  const panel = document.getElementById('detail');

  const color = TYPE_COLORS[data.type] || '#64748b';
  const conf  = (data.confidence || 0).toFixed(2);

  panel.innerHTML = `
    <h2>
      <span class="type-dot" style="background:${color}"></span>
      ${esc(data.label || data.id)}
      <span class="badge" style="background:${color}20;color:${color}">${esc(data.type)}</span>
    </h2>
    <p style="font-size:11px;color:#475569">Confiança: ${conf}${data.inferred ? ' · <i>inferido</i>' : ''}</p>
    ${data.file ? `<p style="font-size:10px;color:#475569;word-break:break-all;margin-top:2px">${esc(data.file)}</p>` : ''}
    <p style="margin-top:8px; color:#475569; font-size:11px">Carregando relações...</p>
  `;

  try {
    const res = await fetch(`${BASE}/api/program/${encodeURIComponent(data.id)}`).then(r => r.json());
    renderDetail(panel, data, res);
  } catch (_) {
    // Non-program node — show edges only from graph
    const outgoing = cy.edges(`[source="${data.id}"]`).map(e => ({ rel: e.data('rel'), to: e.data('target'), confidence: e.data('confidence') }));
    const incoming = cy.edges(`[target="${data.id}"]`).map(e => ({ rel: e.data('rel'), from: e.data('source'), confidence: e.data('confidence') }));
    renderDetailSimple(panel, data, outgoing, incoming);
  }
}

function renderDetail(panel, data, res) {
  const color = TYPE_COLORS[data.type] || '#64748b';
  const conf  = (data.confidence || 0).toFixed(2);

  const outgoing = (res.outgoing || []).slice(0, 30);
  const incoming = (res.incoming || []).slice(0, 30);

  panel.innerHTML = `
    <h2>
      <span class="type-dot" style="background:${color}"></span>
      ${esc(data.label || data.id)}
      <span class="badge" style="background:${color}20;color:${color}">${esc(data.type)}</span>
    </h2>
    <p style="font-size:11px;color:#475569">Confiança: ${conf}${data.inferred ? ' · <i>inferido</i>' : ''}</p>
    ${data.file ? `<p style="font-size:10px;color:#475569;word-break:break-all;margin-top:2px">${esc(data.file)}</p>` : ''}

    ${outgoing.length ? `
      <h3>Chama / usa (${outgoing.length})</h3>
      <ul class="rel-list">${outgoing.map(r => `
        <li>
          <span class="name" onclick="focusNode('${esc(r.to_id || r.to)}')">${esc(r.to_label || r.to)}</span>
          <span class="rel-type">${esc(r.rel)} ${(r.confidence||0).toFixed(2)}</span>
        </li>`).join('')}
      </ul>
    ` : ''}

    ${incoming.length ? `
      <h3>Chamado por (${incoming.length})</h3>
      <ul class="rel-list">${incoming.map(r => `
        <li>
          <span class="name" onclick="focusNode('${esc(r.from_id || r.from)}')">${esc(r.from_label || r.from)}</span>
          <span class="rel-type">${esc(r.rel)}</span>
        </li>`).join('')}
      </ul>
    ` : ''}

    ${res.source ? `
      <h3>Código-fonte (primeiras 200 linhas)</h3>
      <div id="source-preview">${esc(res.source.slice(0, 3000))}</div>
    ` : ''}

    ${res.flow && res.flow.paragraphs ? `
      <h3>Parágrafos (${res.flow.paragraphs.length})</h3>
      <ul class="rel-list">${res.flow.paragraphs.slice(0, 20).map(p => `
        <li><span style="font-size:11px;color:#94a3b8">${esc(p.name)}</span>
            <span class="rel-type">linha ${p.line}</span></li>`).join('')}
      </ul>
    ` : ''}
  `;
}

function renderDetailSimple(panel, data, outgoing, incoming) {
  const color = TYPE_COLORS[data.type] || '#64748b';
  panel.innerHTML = `
    <h2>
      <span class="type-dot" style="background:${color}"></span>
      ${esc(data.id)}
      <span class="badge" style="background:${color}20;color:${color}">${esc(data.type)}</span>
    </h2>
    ${outgoing.length ? `
      <h3>Saídas</h3>
      <ul class="rel-list">${outgoing.map(r => `
        <li><span class="name" onclick="focusNode('${esc(r.to_id || r.to)}')">${esc(r.to_label || r.to)}</span>
            <span class="rel-type">${esc(r.rel)}</span></li>`).join('')}
      </ul>` : ''}
    ${incoming.length ? `
      <h3>Entradas</h3>
      <ul class="rel-list">${incoming.map(r => `
        <li><span class="name" onclick="focusNode('${esc(r.from_id || r.from)}')">${esc(r.from_label || r.from)}</span>
            <span class="rel-type">${esc(r.rel)}</span></li>`).join('')}
      </ul>` : ''}
  `;
}

function clearDetail() {
  document.getElementById('detail').innerHTML = '<p style="color:#475569;font-size:12px">Clique em um nó para ver os detalhes.</p>';
}

function focusNode(id) {
  if (!cy) return;
  const node = cy.$(`#${CSS.escape(id)}`);
  if (node.length) {
    cy.animate({ fit: { eles: node, padding: 80 }, duration: 400 });
    node.select();
    showDetail(node.data());
  }
}

/* ── Search ───────────────────────────────────────────────────────── */
let searchTimeout = null;

document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();
  if (q.length < 2) { hideSearchResults(); return; }
  searchTimeout = setTimeout(() => doSearch(q), 250);
});

document.getElementById('search-input').addEventListener('keydown', e => {
  if (e.key === 'Escape') hideSearchResults();
});

async function doSearch(q) {
  const res = await fetch(`${BASE}/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()).catch(() => []);
  const box = document.getElementById('search-results');
  if (!res.length) { hideSearchResults(); return; }
  box.innerHTML = res.map(r => `
    <div class="search-item" onclick="selectSearchResult('${esc(r.id)}')">
      <span class="si-name">${esc(r.label || r.name)}</span>
      <span class="si-type">${esc(r.type)}</span>
    </div>
  `).join('');
  box.classList.add('visible');
}

function selectSearchResult(id) {
  hideSearchResults();
  document.getElementById('search-input').value = id;
  focusNode(id);
}

function hideSearchResults() {
  document.getElementById('search-results').classList.remove('visible');
}

/* ── Toolbar ──────────────────────────────────────────────────────── */
document.getElementById('btn-load').addEventListener('click', loadGraph);

document.getElementById('btn-fit').addEventListener('click', () => {
  if (cy) cy.fit(undefined, 30);
});

document.getElementById('btn-reset-layout').addEventListener('click', () => {
  if (!cy) return;
  cy.layout({ name: 'cose', animate: true, randomize: false, nodeRepulsion: 8000, padding: 30 }).run();
});

document.getElementById('btn-export-svg').addEventListener('click', () => {
  if (!cy) return;
  const svg  = cy.svg({ scale: 1, full: true });
  const blob = new Blob([svg], { type: 'image/svg+xml' });
  const a    = document.createElement('a');
  a.href     = URL.createObjectURL(blob);
  a.download = 'uai-graph.svg';
  a.click();
});

document.getElementById('filter-conf').addEventListener('input', e => {
  document.getElementById('conf-label').textContent = parseFloat(e.target.value).toFixed(2);
});

/* ── Utils ────────────────────────────────────────────────────────── */
function showLoading(v) {
  document.getElementById('loading').style.display = v ? 'flex' : 'none';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* ── Init ─────────────────────────────────────────────────────────── */
loadGraph();
</script>
</body>
</html>
